<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Form</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #details {
            margin: 20px;
            max-width: 500px;
        }
        #dp {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: auto;
            border: 1px solid #ccc;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            margin-left: 20px;
        }
        p {
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <h1>Driving License</h1>
    <form id ="details">
        <label>Name:</label>
        <input type="text" id="name" required>
        <br><br>
        <label>Email:</label>
        <input type="email" id="mail" required>
        <br><br>
        <label>Phone:</label>
        <input type ="number" id ="phone" required>
        <br><br>
        <label>Age:</label>
        <input type ="number" id ="age" required>
        <br><br>
        <label>Gender:</label>
        <input type="radio" name="gender" id="gender-male" value="Male" required> <label for="gender-male">Male</label>
        <input type="radio" name="gender" id="gender-female" value="Female"> <label for="gender-female">Female</label>
        <input type="radio" name="gender" id="gender-other" value="Other"> <label for="gender-other">Other</label>
        <br><br>
        <label>Address:</label>
        <input type ="text" id ="address" required>
        <br><br>
        <label>Photo:</label>
        <input type ="file" id ="image" accept="image/*" required>
        <br><br>
        <button type="submit">Submit</button>
            </form>
            <h2>License Details</h2>
            <p id="p1"></p>
            <p id="p2"></p>
            <p id="p3"></p>
            <p id="p4"></p>
            <p id="p5"></p>
            <p id="p6"></p>
            <img id="dp" width="200px">
            <script src ="Form.js"></script>
</body>
</html>
